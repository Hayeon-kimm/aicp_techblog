remote_theme: mmistakes/minimal-mistakes

# Site settings
title: Tech Blog
subtitle: "개발 에러 분석 & 기술 블로그"
name: Hayeon Kim
description: >-
  개발 중 만나는 에러를 분석하고 해결법을 공유하는 기술 블로그입니다.
baseurl: ""
url: "https://hayeon-kimm.github.io"
repository: "Hayeon-kimm/aicp_techblog"

# Site Author
author:
  name: "Hayeon Kim"
  bio: "Developer"
  location: "South Korea"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/Hayeon-kimm"

# Reading
words_per_minute: 200

# Build settings
markdown: kramdown
highlighter: rouge

plugins:
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-remote-theme

# Outputting
permalink: /:categories/:title/
timezone: Asia/Seoul

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
      show_date: true
  - scope:
      path: ""
    values:
      layout: single

# Skin
minimal_mistakes_skin: "dark"

# Pagination
paginate: 10
paginate_path: /page:num/

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
